# H2 Database Configuration (File-Based for Persistence)
spring.datasource.url=jdbc:h2:file:./data/taskdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Port
server.port=8080

# JavaMail IMAP Configuration (Gmail Example)
spring.mail.host=imap.gmail.com
spring.mail.port=993
spring.mail.username=${GMAIL_EMAIL:your_email@gmail.com}
spring.mail.password=${GMAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.store.protocol=imap
spring.mail.properties.mail.imap.ssl.enable=true

# OpenAI/Gemini API Key
app.openai.api-key=${OPENAI_API_KEY:sk-your-api-key-here}

# Google OAuth 2.0 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id-here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret-here}

spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/gmail.readonly
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google